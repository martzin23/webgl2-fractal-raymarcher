<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
	<title>Fractal Ray Marcher</title>
	<link rel="stylesheet" href="./styles/general.css">
	<link rel="stylesheet" href="./styles/keyframes.css">
	<link rel="stylesheet" href="./styles/flex.css">
	<link rel="stylesheet" href="./styles/widgets.css">
	<link rel="stylesheet" href="./styles/layout.css">
	<script type="module" defer src="./scripts/rendering/renderer.js"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

	<header>
		<nav>
			<div id="group-tabs"></div>
			<div class="row gap-small">
				<samp id="output-fps">0 fps</samp>
				<button>
					<p>GitHub</p>
					<i class="fa fa-external-link"></i>
					<a href="https://github.com/martzin23/webgl2-fractal-raymarcher"></a>
				</button>
			</div>
		</nav>
	</header>

	<menu id="menu">

		<section id="group-unselected" class="hidden">
			<figure>
				<figcaption>
					<hr>
					<p>Unselected</p>
				</figcaption>
				<em>No settings tab selected.</em>
			</figure>
		</section>

		<section class="hidden">
			<figure id="group-display">
				<figcaption>
					<hr>
					<p>Display</p>
				</figcaption>
			</figure>

			<figure id="group-misc">
				<figcaption>
					<hr>
					<p>Misc</p>
				</figcaption>
			</figure>

			<figure id="group-camera">
				<figcaption>
					<hr>
					<p>Camera</p>
				</figcaption>
				<div id="group-camera-mode" class="column"></div>
				<div>
					<div id="group-camera-firstperson" class="column gap-small"></div>
					<div id="group-camera-orbit" class="column gap-small"></div>
				</div>
			</figure>
		</section>

		<section class="hidden">
			<figure id="group-shading">
				<figcaption>
					<hr>
					<p>Shading</p>
				</figcaption>
			</figure>

			<figure id="group-marching">
				<figcaption>
					<hr>
					<p>Marching</p>
				</figcaption>
			</figure>

			<figure id="group-sdf">
				<figcaption>
					<hr>
					<p>Signed Distance Function</p>
				</figcaption>
			</figure>
			
			<figure>
				<figcaption>
					<hr>
					<p>Shape parameters</p>
				</figcaption>
				<em>Try changing some values to see how they impact the shape of the body</em>
				<div id="group-variables">
					<div id="group-custom" class="column gap-small"></div>
					<div id="group-mandelbox" class="column gap-small"></div>
					<div id="group-mandelbulb" class="column gap-small"></div>
					<div id="group-kochcurve" class="column gap-small"></div>
					<div id="group-juliabulb" class="column gap-small"></div>
				</div>
			</figure>

			<figure id="group-lens">
				<figcaption>
					<hr>
					<p>Lens</p>
				</figcaption>
			</figure>

			<figure id="group-sun">
				<figcaption>
					<hr>
					<p>Sky</p>
				</figcaption>
			</figure>
		</section>

		<section class="hidden">
			<figure id="group-instructions">
				<figcaption>
					<hr>
					<p>Instructions</p>
				</figcaption>
				<p>Here you can write a custom signed distance function in GLSL that describes a body. The parameters and return value type are defined here:</p>
				<div class="row">
					<samp>p</samp>
					<em>parameter - a position in 3D space</em>
				</div>
				<div class="row">
					<samp>return value</samp>
					<em>distance from the body</em>
				</div>
				<div class="row">
					<samp>uniforms.custom_a</samp>
					<em>A float variable that can be changed in real time in the Ray Marching tab. There are five of them (a,b,c,d,e).</em>
				</div>
				
			</figure>
			
			<figure id="group-code">
				<figcaption>
					<hr>
					<p>Code</p>
				</figcaption>
				<div language="GLSL" class="code">
					<textarea spellcheck="false" rows="20" class="code" id="input-code" wrap="off"></textarea>
				</div>
			</figure>
			
			<figure id="group-error">
				<figcaption>
					<hr>
					<p>Error message</p>
				</figcaption>
				<p id="output-error" class="error"></p>
			</figure>
		</section>

		<section class="hidden" id="group-controls">
            <figure>
                <figcaption>
                    <hr>
                    <p>Controls (PC)</p>
                </figcaption>
                <div class="row">
                    <samp>Click</samp>
                    <em>Toggle camera control</em>
                </div>
                <div class="row">
                    <samp>F11</samp>
                    <em>Toggle fullscreen</em>
                </div>
                <div class="row">
                    <samp>Up/Down arrow</samp>
                    <em>Change resolution</em>
                </div>
            </figure>
            <figure>
                <figcaption>
                    <hr>
                    <p>Controls (PC) (Orbit mode)</p>
                </figcaption>
                <div class="row">
                    <samp>ADQE</samp>
                    <em>Rotate</em>
                </div>
                <div class="row">
                    <samp>WS</samp>
                    <em>Zoom</em>
                </div>
                <div class="row">
                    <samp>Mouse</samp>
                    <em>Rotate</em>
                </div>
                <div class="row">
                    <samp>Scroll</samp>
                    <em>Zoom</em>
                </div>
            </figure>
            <figure>
                <figcaption>
                    <hr>
                    <p>Controls (PC) (First person mode)</p>
                </figcaption>
                <div class="row">
                    <samp>WASDQE</samp>
                    <em>Movement</em>
                </div>
                <div class="row">
                    <samp>Mouse</samp>
                    <em>Rotate</em>
                </div>
                <div class="row">
                    <samp>Scroll</samp>
                    <em>Change camera speed</em>
                </div>
            </figure>
            <figure>
                <figcaption>
                    <hr>
                    <p>Controls (Mobile)</p>
                </figcaption>
                <div class="row">
                    <samp>Drag</samp>
                    <em>Rotate camera</em>
                </div>
                <div class="row">
                    <samp>Zoom</samp>
                    <em>Move foward/backward</em>
                </div>
                <div class="row">
                    <samp>Pan</samp>
                    <em>Move to the side</em>
                </div>
            </figure>
		</section>
	</menu>

	<canvas id="canvas"></canvas>

	<div class="popup hidden" id="popup-error">
		<div>
			<header>
				<i class="fa fa-times"></i>		
				<p>Error</p>
			</header>
			<samp id="output-fail">This device does not support WebGL!</samp>
			<button onclick="location.reload();">
				<i class="fa fa-refresh"></i>
				<p>Restart</p>
			</button>
		</div>
	</div>
</body>
</html>
